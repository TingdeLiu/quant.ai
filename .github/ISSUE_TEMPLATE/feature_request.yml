name: 功能建议
description: 提出一个新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 描述当前的痛点或缺失的能力
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望它如何工作？有参考的工具或命令吗？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / 补充信息
      description: 其他考虑过的做法，或相关背景
