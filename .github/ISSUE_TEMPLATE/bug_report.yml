name: Bug 反馈
description: 报告一个错误或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！请尽量填写以下信息，便于快速定位问题。
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述
      description: 发生了什么？你期望的是什么？
      placeholder: 运行 `python -m quant_agent analyze AAPL` 时报错……
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      description: 完整的命令和操作步骤
      placeholder: |
        1. 执行 `python -m quant_agent analyze ...`
        2. 看到错误 ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 错误日志 / 截图
      description: 粘贴完整的报错堆栈（会自动按代码块格式化）
      render: shell
  - type: input
    id: version
    attributes:
      label: 运行环境
      description: 操作系统、Python 版本、安装方式（conda / pip）
      placeholder: Windows 11, Python 3.11, pip
    validations:
      required: true
